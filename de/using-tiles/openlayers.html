<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Simple Map</title>
        <link
            rel="stylesheet"
            href="http://openlayers.org/en/v3.18.2/css/ol.css"
            type="text/css"
        />
        <style>
            html,
            body {
                height: 100%;
                padding: 0;
                margin: 0;
            }
            #map {
                /* Die Groesse der Karte konfigurieren */
                width: 100%;
                height: 100%;
            }
        </style>
        <!-- Die Zeile unterhalb, wird nur für alte Umgebungen wie Internet Explorer und Android 4.x benoetigt -->
        <script src="http://cdn.polyfill.io/v2/polyfill.min.js?features=requestAnimationFrame,Element.prototype.classList,URL"></script>
        <script src="http://openlayers.org/en/v3.18.2/build/ol.js"></script>
    </head>
    <body>
        <div id="map" class="map"></div>
        <div id="popup" style="padding: 10px; background-color: white"></div>
        <script>
            var map = new ol.Map({
                layers: [
                    new ol.layer.Tile({
                        // Dies stellt eine benutzerdefiniert Tile-Quelle dar.
                        // Aber um den offiziellen OpenStreetMap-Server zu nutzen, ist es ausreichend new ol.source.OSM()
                        // zu verwenden anstatt von new ol.source.XYZ(...)
                        source: new ol.source.XYZ({
                            attributions: [
                                ol.source.OSM.ATTRIBUTION,
                                "Tiles zur Verfügung gestellt durch " +
                                    '<a href="http://openstreetmap.org">' +
                                    "OpenStreetMap" +
                                    "</a>",
                            ],
                            url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
                        }),
                    }),
                ],
                controls: ol.control
                    .defaults({
                        // OSM-Attribution in der unteren rechten Ecke anzeigen.
                        attributionOptions: {
                            collapsed: false,
                        },
                    })
                    .extend([
                        new ol.control.ScaleLine(), // Eine Massstab-Linie zu den Standard-Steuerelementen hinzufuegen
                    ]),
                target: "map",
                view: new ol.View({
                    center: ol.proj.fromLonLat([0, 0]),
                    zoom: 2,
                }),
            });

            // Hinzufuegen einer Vektor-Ebene mit einem Objekt und einem Stil, der ein Symbol verwendet
            var vectorLayer = new ol.layer.Vector({
                source: new ol.source.Vector({
                    features: [
                        new ol.Feature({
                            geometry: new ol.geom.Point(
                                ol.proj.fromLonLat([0, 0]),
                            ),
                            name: "Der Mittelpunkt der Welt",
                        }),
                    ],
                }),
                style: new ol.style.Style({
                    image: new ol.style.Icon({
                        anchor: [0.5, 46],
                        anchorXUnits: "fraction",
                        anchorYUnits: "pixels",
                        src: "http://openlayers.org/en/latest/examples/data/icon.png",
                    }),
                }),
            });

            map.addLayer(vectorLayer);

            // Overlay zur Verwaltung von Popup-Einblendungen auf der Karte
            var popup = document.getElementById("popup");
            var overLay = new ol.Overlay({
                element: popup,
                position: ol.proj.fromLonLat([0, 0]),
            });

            map.addOverlay(overLay);

            // Durch Klicken auf die Karte Popup anzeigen/verbergen
            map.on("click", function (e) {
                var info = [];
                map.forEachFeatureAtPixel(e.pixel, function (feature) {
                    info.push(feature.get("name"));
                });
                if (info.length > 0) {
                    popup.innerHTML = info.join(",");
                    popup.style.display = "inline";
                } else {
                    popup.innerHTML = "&nbsp;";
                    popup.style.display = "none";
                }
            });
        </script>
    </body>
</html>
