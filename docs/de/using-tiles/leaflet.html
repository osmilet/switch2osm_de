<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9/dist/leaflet.css"
        />
        <style>
            html,
            body {
                height: 100%;
                padding: 0;
                margin: 0;
            }
            #map {
                /* Die Groesse der Karte konfigurieren */
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script>
            // Leaflet initialisieren
            var map = L.map("map").setView({ lon: 0, lat: 0 }, 2);

            // Die OpenStreetMap Tiles hinzufügen
            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution:
                    '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap Mitwirkende</a>',
            }).addTo(map);

            // Den Massstab in der unteren linken Ecke darstellen
            L.control.scale({ imperial: true, metric: true }).addTo(map);

            // Einen Marker auf der Karte darstellen
            L.marker({ lon: 0, lat: 0 })
                .bindPopup("Der Mittelpunkt der Welt")
                .addTo(map);
        </script>
    </body>
</html>
